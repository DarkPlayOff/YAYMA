name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  run-build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    
  create-release:
    needs: run-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Release Notes
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          
          NOTES=$(awk "/## \[$VERSION\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md)
          
          if [ -z "$NOTES" ]; then
            NOTES="Release for version $VERSION"
          fi
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: YAYMA ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: release_artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-aur-pkgbuild:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate PKGBUILD
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          REPO="${{ github.repository }}"
          X64_URL="https://github.com/${REPO}/releases/download/v${VERSION}/yayma-linux-x64-${VERSION}.tar.gz"
          LICENSE_URL="https://raw.githubusercontent.com/${REPO}/v${VERSION}/LICENSE"

          TARBALL_SHA_X64=$(curl -sL --fail "$X64_URL" | sha256sum | cut -d' ' -f1)
          LICENSE_SHA=$(curl -sL --fail "$LICENSE_URL" | sha256sum | cut -d' ' -f1)
          DESKTOP_SHA=$(sha256sum packaging/linux/io.github.darkplayoff.yayma.desktop | cut -d' ' -f1)

          if [ -z "$TARBALL_SHA_X64" ] || [ -z "$LICENSE_SHA" ] || [ -z "$DESKTOP_SHA" ]; then
            echo "::error::Failed to download release asset(s) or LICENSE to compute checksums"
            exit 1
          fi

          REPO_ESCAPED=$(printf '%s' "$REPO" | sed 's/[&/\]/\\&/g')
          sed \
            -e "s/@VERSION@/${VERSION}/g" \
            -e "s/@REPO@/${REPO_ESCAPED}/g" \
            -e "s/@TARBALL_SHA_X64@/${TARBALL_SHA_X64}/g" \
            -e "s/@LICENSE_SHA@/${LICENSE_SHA}/g" \
            -e "s/@DESKTOP_SHA@/${DESKTOP_SHA}/g" \
            packaging/aur/yayma-bin/PKGBUILD.template > PKGBUILD

      - name: Upload PKGBUILD to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" PKGBUILD --clobber --repo "${{ github.repository }}"
