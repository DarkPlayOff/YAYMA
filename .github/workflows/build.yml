name: Build Release

on:
  workflow_dispatch:
  workflow_call:

env:
  FRB_VERSION: "2.13.0-beta.5"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Init
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libasound2-dev curl git unzip clang lld libclang-dev llvm-dev libayatana-appindicator3-dev libdbus-1-dev imagemagick

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src/rust -> src/target"
          key: ${{ env.FRB_VERSION }}

      - name: Install Tools
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo-binstall" ]; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi
          cargo install flutter_rust_bridge_codegen --version "$FRB_VERSION" --locked
          cargo binstall -y cargo-expand

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build
        working-directory: ./src
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build linux --release

      - name: Archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" == "$GITHUB_REF" ]; then VERSION="manual"; fi
          tar -czvf yayma-linux-x64-${VERSION}.tar.gz -C src/build/linux/x64/release/bundle/ .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux_x64_release
          path: yayma-linux-*.tar.gz

      - name: Build AppDir
        run: |
          mkdir -p AppDir
          cp -r src/build/linux/x64/release/bundle/. AppDir/

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          # CMAKE_INSTALL_RPATH is $ORIGIN/lib, correct for the yayma binary at
          # AppDir root but not for plugin .so files that already live in lib/
          # themselves (their $ORIGIN/lib points at a nonexistent lib/lib).
          # Export LD_LIBRARY_PATH so every loaded library searches lib/
          # regardless of its own RPATH.
          export LD_LIBRARY_PATH="$HERE/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          exec "$HERE/yayma" "$@"
          EOF
          chmod +x AppDir/AppRun

          install -Dm644 packaging/linux/io.github.darkplayoff.yayma.desktop AppDir/io.github.darkplayoff.yayma.desktop
          convert src/assets/icons/logo.webp -resize 256x256 AppDir/io.github.darkplayoff.yayma.png

      - name: Download linuxdeploy
        run: |
          curl -Lo linuxdeploy "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy

      - name: Bundle native library dependencies
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          # Flutter plugins (e.g. tray_manager -> libayatana-appindicator3) can pull in
          # system shared libraries that CMake's plugin bundling doesn't follow
          # transitively, leaving the AppImage without them on systems that lack the
          # package. Let linuxdeploy resolve and bundle those for every .so we already
          # ship, but don't hand it the AppDir wholesale: Flutter looks up its own
          # data/ directory relative to the executable's location, which linuxdeploy's
          # usr/bin + usr/lib FHS layout would break, and we already have a working
          # AppRun + RPATH ($ORIGIN/lib) for the rest of the bundle.
          library_args=()
          for lib in AppDir/lib/*.so*; do
            [ -f "$lib" ] && library_args+=(--library "$lib")
          done
          ./linuxdeploy --appdir AppDir "${library_args[@]}"

          # linuxdeploy deposits resolved dependencies under AppDir/usr/lib; flatten
          # them into AppDir/lib (already on RPATH) and drop the FHS scaffolding.
          find AppDir/usr/lib -maxdepth 1 -name '*.so*' -exec cp -n {} AppDir/lib/ \;
          rm -rf AppDir/usr AppDir/apprun-hooks

      - name: Strip debug symbols
        run: |
          find AppDir -type f \( -name "*.so*" -o -name "yayma" \) -print0 |
            xargs -0 -r strip --strip-unneeded || true

      - name: Download appimagetool
        run: |
          curl -Lo appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" == "$GITHUB_REF" ]; then VERSION="manual"; fi
          ./appimagetool --comp zstd AppDir "yayma-x86_64-${VERSION}.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage_x64_release
          path: yayma-*.AppImage

  build-windows:
    runs-on: windows-latest
    env:
      RUSTFLAGS: -C linker=lld-link.exe
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src/rust -> src/target"
          key: ${{ env.FRB_VERSION }}

      - name: Install Tools
        run: |
          if ((Test-Path "$HOME\.cargo\bin\cargo-binstall.exe") -eq $false) {
            curl.exe -L --proto "=https" --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1 -o install-binstall.ps1
            powershell -ExecutionPolicy RemoteSigned -File install-binstall.ps1 -Force
          }
          cargo install flutter_rust_bridge_codegen --version "$env:FRB_VERSION" --locked
          cargo binstall -y cargo-expand
        shell: powershell

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build
        working-directory: ./src
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build windows --release
        shell: powershell

      - name: Archive
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          if ($VERSION -eq $env:GITHUB_REF) { $VERSION = "manual" }
          Compress-Archive -Path "src\build\windows\x64\runner\Release\*" -DestinationPath "yayma-windows-x64-$VERSION.zip"
        shell: powershell

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows_x64_release
          path: yayma-windows-*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Init
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libasound2-dev curl git unzip clang lld libclang-dev llvm-dev libayatana-appindicator3-dev libdbus-1-dev

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android
          components: rust-src

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src/rust -> src/target"
          key: ${{ env.FRB_VERSION }}

      - name: Install Tools
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo-binstall" ]; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi
          cargo install flutter_rust_bridge_codegen --version "$FRB_VERSION" --locked
          cargo binstall -y cargo-expand

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Android Signing
        working-directory: ./src/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          present=0
          missing=0
          for v in KEYSTORE_B64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -n "${!v}" ]; then present=$((present + 1)); else missing=$((missing + 1)); fi
          done

          if [ "$present" -eq 4 ]; then
            echo "$KEYSTORE_B64" | base64 -d > app/release.keystore
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=release.keystore"
            } > key.properties
            echo "SIGN_SUFFIX=" >> "$GITHUB_ENV"
          elif [ "$missing" -eq 4 ]; then
            echo "No release signing secrets found; falling back to debug signing"
            echo "SIGN_SUFFIX=-dsign" >> "$GITHUB_ENV"
          else
            echo "::error::Incomplete Android signing secrets: need all of ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD set together, or none of them."
            exit 1
          fi

      - name: Build
        working-directory: ./src
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build apk --release --split-per-abi

      - name: Archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" == "$GITHUB_REF" ]; then VERSION="manual"; fi
          mkdir -p android_artifacts
          for apk in src/build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(basename "$apk" | sed -E 's/app-(.*)-release\.apk/\1/')
            cp "$apk" "android_artifacts/yayma-android-${abi}-${VERSION}${SIGN_SUFFIX}.apk"
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android_release
          path: android_artifacts/yayma-android-*.apk
