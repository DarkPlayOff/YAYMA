name: Manual Build

on:
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Update System and Install Deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git cmake ninja pkg-config \
            gtk3 libsecret libsoup3 unzip curl wget \
            clang llvm wpewebkit wpebackend-fdo libwpe rustup

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Rust & FRB
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: ${{ runner.os }}-arch-rust-frb-2.12.0-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust
        run: |
          rustup default stable
          echo "LIBCLANG_PATH=/usr/lib" >> $GITHUB_ENV
          echo "CLANG_PATH=/usr/bin/clang" >> $GITHUB_ENV
          echo "/root/.cargo/bin" >> $GITHUB_PATH

      - name: Install FRB Codegen
        run: |
          if ! command -v flutter_rust_bridge_codegen &> /dev/null; then
            cargo install flutter_rust_bridge_codegen --version 2.12.0
          fi
          
      - name: Cache Flutter SDK
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: /opt/flutter
          key: ${{ runner.os }}-arch-flutter-linux-stable

      - name: Install Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com -b stable /opt/flutter
          /opt/flutter/bin/flutter precache --linux --no-android --no-ios --no-web --no-fuchsia

      - name: Build Project
        run: |
          export PATH="$PATH:/opt/flutter/bin:/root/.cargo/bin"
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build linux --release

      - name: Prepare Archive
        run: |
          cd build/linux/x64/release/bundle/
          tar -czvf ../../../../linux_release.tar.gz .

      # 9. Загрузка артефакта
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_release
          path: linux_release.tar.gz
