name: Manual Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Init
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libasound2-dev curl git unzip clang lld libclang-dev llvm-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            frontend/target/
          key: rust-frb-2.12.0-linux-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tools
        run: |
          # Install binstall if not present
          if [ ! -f "$HOME/.cargo/bin/cargo-binstall" ]; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi
          # Install others via binstall
          cargo binstall -y flutter_rust_bridge_codegen --version 2.12.0
          cargo binstall -y cargo-expand

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build
        working-directory: ./frontend
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build linux --release --no-pub

      - name: Archive
        run: |
          tar -czvf linux_release.tar.gz -C frontend/build/linux/x64/release/bundle/ .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux_release_tar
          path: linux_release.tar.gz
          compression-level: 0

  build-windows:
    runs-on: windows-latest
    env:
      RUSTFLAGS: -C linker=lld-link.exe
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            frontend/target/
          key: rust-frb-2.12.0-windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tools
        run: |
          # Install binstall using curl to avoid PowerShell iwr issues
          if ((Test-Path "$HOME\.cargo\bin\cargo-binstall.exe") -eq $false) {
            curl.exe -L --proto "=https" --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1 -o install-binstall.ps1
            powershell -ExecutionPolicy RemoteSigned -File install-binstall.ps1 -Force
          }
          # Install others via binstall
          cargo binstall -y flutter_rust_bridge_codegen --version 2.12.0
          cargo binstall -y cargo-expand
        shell: powershell

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build
        working-directory: ./frontend
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build windows --release --no-pub
        shell: powershell

      - name: Archive
        run: |
          Compress-Archive -Path "frontend\build\windows\x64\runner\Release\*" -DestinationPath "windows_release.zip"
        shell: powershell

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows_release_zip
          path: windows_release.zip
          compression-level: 0

