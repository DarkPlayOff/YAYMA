name: Manual Build

on:
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: System Init
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git cmake ninja pkg-config gtk3 libsecret libsoup3 unzip curl wget clang llvm wpewebkit wpebackend-fdo libwpe rustup

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: rust-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-target-

      - name: Setup Rust
        run: |
          rustup default stable
          echo "LIBCLANG_PATH=/usr/lib" >> $GITHUB_ENV
          echo "CLANG_PATH=/usr/bin/clang" >> $GITHUB_ENV

      - name: Install Prebuilt FRB Codegen
        run: |
          mkdir -p /usr/local/bin
          curl -L https://github.com | tar xz -C /usr/local/bin
          chmod +x /usr/local/bin/flutter_rust_bridge_codegen

      - name: Install Flutter
        run: |
          git clone --depth 1 --single-branch https://github.com -b stable /opt/flutter
          /opt/flutter/bin/flutter precache --linux --no-android --no-ios --no-web --no-fuchsia

      - name: Build
        run: |
          export PATH="$PATH:/opt/flutter/bin:/usr/local/bin"
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build linux --release --no-pub

      - name: Archive
        run: tar -czvf linux_release.tar.gz -C build/linux/x64/release/bundle/ .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux_release
          path: linux_release.tar.gz
