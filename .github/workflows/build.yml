name: Manual Arch Build (YAYMA)

on:
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: System Init
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git cmake ninja pkg-config gtk3 libsecret libsoup3 unzip curl wget clang llvm wpewebkit wpebackend-fdo libwpe rustup

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo/
            frontend/target/
          key: rust-frb-2.12.0-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust
        run: |
          rustup default stable
          echo "LIBCLANG_PATH=/usr/lib" >> $GITHUB_ENV
          echo "/root/.cargo/bin" >> $GITHUB_PATH

      - name: Install Tools
        run: |
          git clone --depth 1 -b stable https://github.com/flutter/flutter /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          /root/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/cargo install flutter_rust_bridge_codegen --version 2.12.0 || true

      - name: Build
        working-directory: ./frontend
        run: |
          export PATH="$PATH:/opt/flutter/bin:/root/.cargo/bin"
          flutter config --no-analytics
          flutter pub get
          /root/.cargo/bin/flutter_rust_bridge_codegen generate
          flutter build linux --release --no-pub

      - name: Archive
        run: tar -czvf linux_release.tar.gz -C frontend/build/linux/x64/release/bundle/ .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux_release
          path: linux_release.tar.gz
