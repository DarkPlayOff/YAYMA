name: Manual Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Init
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libasound2-dev curl git unzip clang libclang-dev llvm-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            frontend/target/
          key: rust-frb-2.12.0-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install FRB Codegen
        run: |
          if [ ! -f "$HOME/.cargo/bin/flutter_rust_bridge_codegen" ]; then
            cargo install flutter_rust_bridge_codegen --version 2.12.0
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build
        working-directory: ./frontend
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build linux --release --no-pub

      - name: Archive
        run: |
          tar -czvf linux_release.tar.gz -C frontend/build/linux/x64/release/bundle/ .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux_release_tar
          path: linux_release.tar.gz
          compression-level: 0

