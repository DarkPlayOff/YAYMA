name: Debug Build

on:
  workflow_dispatch:

jobs:
  build-linux-debug:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Init
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libasound2-dev curl git unzip clang libclang-dev llvm-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            frontend/target/
          key: rust-frb-debug-linux-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tools
        run: |
          # Install binstall if not present
          if [ ! -f "$HOME/.cargo/bin/cargo-binstall" ]; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi
          # Install others via binstall
          cargo binstall -y flutter_rust_bridge_codegen --version 2.12.0
          cargo binstall -y cargo-expand

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build
        working-directory: ./frontend
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build linux --debug --no-pub

      - name: Archive
        run: |
          tar -czvf linux_debug.tar.gz -C frontend/build/linux/x64/debug/bundle/ .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux_debug_tar
          path: linux_debug.tar.gz

  build-windows-debug:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            frontend/target/
          key: rust-frb-debug-windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tools
        run: |
          # Install binstall
          if ((Test-Path "$HOME\.cargo\bin\cargo-binstall.exe") -eq $false) {
            Set-ExecutionPolicy RemoteSigned -Scope Process ; iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content
          }
          # Install others via binstall
          cargo binstall -y flutter_rust_bridge_codegen --version 2.12.0
          cargo binstall -y cargo-expand
        shell: powershell

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build
        working-directory: ./frontend
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter_rust_bridge_codegen generate
          flutter build windows --debug --no-pub
        shell: powershell

      - name: Archive
        run: |
          Compress-Archive -Path "frontend\build\windows\x64\runner\Debug\*" -DestinationPath "windows_debug.zip"
        shell: powershell

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows_debug_zip
          path: windows_debug.zip
