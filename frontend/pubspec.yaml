name: yayma
description: "YAYMA - Yet Another Yandex Music App"
version: 2.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.11.1 <4.0.0'

dependencies:
  audio_service: ^0.18.17
  audio_session: ^0.2.3
  collection: any
  dynamic_color: ^1.8.1
  file_picker: ^11.0.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  path: ^1.9.1
  path_provider: ^2.1.5
  signals_flutter: ^7.1.0
  tray_manager: ^0.5.2
  webview_all: ^1.0.3
  window_manager: ^0.5.1
  windows_taskbar: ^1.1.2
  yayma_builder:
    path: rust_builder

dev_dependencies:
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
#  integration_test:
#    sdk: flutter
  json_serializable: ^6.13.1
  very_good_analysis: ^10.2.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/logo.webp"
  windows:
    generate: true
    image_path: "assets/icons/logo.webp"
  linux:
    generate: true
    image_path: "assets/icons/logo.webp"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  shaders:
    - shaders/vibe.frag
