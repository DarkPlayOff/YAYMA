name: yayma
description: "YAYMA - Yet Another Yandex Music App"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.11.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  collection: any
  file_picker: ^11.0.1
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  path: ^1.9.1
  path_provider: ^2.1.5
  yayma_builder:
    path: rust_builder
  signals_flutter: ^6.3.0
  windows_taskbar: ^1.1.2
  m3e_collection: ^0.3.7
  dynamic_color: ^1.8.1
  webview_all: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  integration_test:
    sdk: flutter
  json_serializable: ^6.13.1
  very_good_analysis: ^10.2.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icons/logo.webp"
  linux:
    generate: true
    image_path: "assets/icons/logo.webp"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  shaders:
    - shaders/vibe.frag
